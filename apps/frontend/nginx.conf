# Rendered from a template by the nginx image so PORT (set by Railway) is honored.
server {
  listen ${PORT};
  listen [::]:${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Fingerprinted assets are immutable -> cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the app shell, so deploys take effect immediately.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # SPA: everything else falls back to the shell (client-side routing).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
