name: pinelodge-assistant

services:
  postgres-app:
    image: postgres:17-alpine
    container_name: pinelodge-postgres-app
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinelodge
      POSTGRES_PASSWORD: pinelodge
      POSTGRES_DB: pinelodge_app
    ports:
      - "5443:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinelodge -d pinelodge_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pinelodge-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Voice observability: call events + errors ship here (see OBSERVE_* envs).
  # UI at http://localhost:5080 with the credentials below.
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: pinelodge-openobserve
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: admin@pinelodge.local
      ZO_ROOT_USER_PASSWORD: observe1234
      ZO_DATA_DIR: /data
    ports:
      - "5080:5080"
    volumes:
      - openobserve_data:/data

  postgres-auth:
    image: postgres:17-alpine
    container_name: pinelodge-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinelodge
      POSTGRES_PASSWORD: pinelodge
      POSTGRES_DB: pinelodge_auth
    ports:
      - "5444:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinelodge -d pinelodge_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: pinelodge-auth
    restart: unless-stopped
    env_file: apps/auth/.env
    environment:
      # The .env holds localhost values for bare-metal dev; override DB host for
      # the compose network.
      DATABASE_URL_AUTH: postgres://pinelodge:pinelodge@postgres-auth:5432/pinelodge_auth
    depends_on:
      postgres-auth:
        condition: service_healthy
    ports:
      - "3001:3001"

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: pinelodge-api-gateway
    restart: unless-stopped
    env_file: apps/api-gateway/.env
    environment:
      # Reach sibling services over the compose network.
      BETTER_AUTH_URL: http://auth:3001
      DATABASE_URL_APP: postgres://pinelodge:pinelodge@postgres-app:5432/pinelodge_app
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "3002:3002"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Browser-facing public URLs, baked into the static bundle at build time.
        VITE_AUTH_URL: http://localhost:3001
        VITE_API_URL: http://localhost:3002
    container_name: pinelodge-frontend
    restart: unless-stopped
    depends_on:
      - auth
      - api-gateway
    ports:
      - "3000:80"

volumes:
  postgres_app_data:
  postgres_auth_data:
  redis_data:
  openobserve_data:
